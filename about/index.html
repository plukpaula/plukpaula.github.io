  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
      background-color: #FAFAFB;
    }

    /* Particle Canvas */
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: auto;
      /* Required for canvas to trace mouse if not handled by window */
    }

    /* Navigation */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 48px;
      box-sizing: border-box;
      z-index: 10;
      pointer-events: none;
      /* Let clicks pass unless on elements */
    }

    .logo-container {
      display: flex;
      align-items: center;
      font-weight: 500;
      font-size: 20px;
      color: #202124;
      pointer-events: auto;
      text-decoration: none;
      letter-spacing: -0.01em;
      gap: 12px;
    }

    .logo-container span {
      font-weight: 600;
      color: #1a1a1a;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
    }

    nav {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      pointer-events: auto;

    nav a {
      text-decoration: none;
      color: #5F6368;
      font-weight: 500;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s ease;
      position: relative;
    }

    nav a:hover {
      color: #202124;
    }

    nav a::after {
      content: '';
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #202124;
      transition: width 0.3s cubic-bezier(0.2, 0, 0, 1);
    }

    nav a:hover::after {
      width: 100%;
    }

    .nav-arrow {
      width: 12px;
      height: 12px;
      opacity: 0.6;
      stroke-width: 2;
    }

    .btn-primary:hover {

    .slider-container {

      box-sizing: border-box;

  <script>
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let particles = [];
    const colorPalette = ['#fc0303', '#f05151', '#eb3925', '#eb257b', '#eb2557', '#eb2528'];

    let mouse = { x: -1000, y: -1000, isActive: false };
    let mouseTimeout;

    // Add event listeners for mouse
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.isActive = true;

      clearTimeout(mouseTimeout);
      mouseTimeout = setTimeout(() => {
        mouse.isActive = false;
      }, 250); // Becomes inactive if mouse stops moving
    });

    window.addEventListener('mouseleave', () => {
      mouse.isActive = false;
    });

    // Add touch support
    window.addEventListener('touchstart', (e) => {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
      mouse.isActive = true;
    });

    window.addEventListener('touchmove', (e) => {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
      mouse.isActive = true;

      clearTimeout(mouseTimeout);
      mouseTimeout = setTimeout(() => {
        mouse.isActive = false;
      }, 250);
    });

    window.addEventListener('touchend', () => {
      mouse.isActive = false;
    });

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;

        this.size = Math.random() * 1 + 0.5;
        this.length = Math.random() * 6 + 2;
        this.color = colorPalette[Math.floor(Math.random() * colorPalette.length)];

        this.vx = 0;
        this.vy = 0;
        this.flowOffset = Math.random() * Math.PI * 2; // Unique wobble phase
        this.speedMultiplier = Math.random() * 0.5 + 0.5; // Parallax effect
      }

      update() {
        let time = Date.now() * 0.001;

        // --- Water Flow / Freewill Base Movement ---
        // Base direction: diagonal up-right
        // Wavy movement created by sine oscillating the angle
        let flowAngle = -Math.PI / 4 + Math.sin(time + this.flowOffset) * 0.4;
        let baseSpeed = 0.5 * this.speedMultiplier; // very slow and peaceful

        let targetVx = Math.cos(flowAngle) * baseSpeed;
        let targetVy = Math.sin(flowAngle) * baseSpeed;

        // --- Magnetic Repel Interaction on Mouse Move ---
        if (mouse.isActive) {
          let dx = this.x - mouse.x;
          let dy = this.y - mouse.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          let repelRadius = width * 1.5; // 65% of width in diameter -> 32.5% radius

          if (dist < repelRadius && dist > 0) {
            // Apply reverse polarity (repel)
            // Quadratic falloff so it's softer at the edges
            let force = Math.pow(1 - (dist / repelRadius), 2) * 1.5;
            targetVx += (dx / dist) * force;
            targetVy += (dy / dist) * force;
          }
        }

        // Smoothly interpolate current velocity towards target
        // Giving it a very slight delay which mimics fluid drag
        this.vx += (targetVx - this.vx) * 0.91;
        this.vy += (targetVy - this.vy) * 0.91;

        this.x += this.vx;
        this.y += this.vy;

        // Wrap around gracefully offscreen
        if (this.x < -50) this.x = width + 50;
        if (this.x > width + 50) this.x = -50;
        if (this.y < -50) this.y = height + 50;
        if (this.y > height + 50) this.y = -50;
      }

      draw(ctx) {
        let drawAngle = Math.atan2(this.vy, this.vx);

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(drawAngle);
        ctx.fillStyle = this.color;

        ctx.beginPath();
        ctx.roundRect(-this.length / 2, -this.size / 2, this.length, this.size, this.size / 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function init() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;

      particles = [];
      // Persistent particle pool instead of continuous spawning
      const particleCount = Math.min(Math.floor(width * height / 3000), 500);
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);

      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw(ctx);
      }

      requestAnimationFrame(animate);
    }

    // Handle resize
    window.addEventListener('resize', () => {
      init();
    });

      { title: "Mobile Framework", subtitle: "Cross-platform Core", desc: "Built a unified cross-platform mobile core that reduced development time by 50% across iOS and Android.", img: "https://picsum.photos/id/28/600/800" },
      { title: "Incident Response", subtitle: "5m MTTR", desc: "Revamped the incident response protocol, driving the Mean Time to Resolution down to just 5 minutes.", img: "https://picsum.photos/id/29/600/800" },
      { title: "Board Member", subtitle: "Tech Advisory", desc: "Invited to sit on the technical advisory board for a prominent ed-tech non-profit organization.", img: "https://picsum.photos/id/30/600/800" }
    ];

    const slider = document.getElementById('slider');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');

    const modal = document.getElementById('modal');
    const modalCloseBtn = document.getElementById('modal-close');
    const modalTitle = document.getElementById('modal-title');
    const modalImage = document.getElementById('modal-image');
    const modalDesc = document.getElementById('modal-desc');

    // Populate Mock Data into Slider
    mockAchievements.forEach(item => {
      const card = document.createElement('div');
      card.className = 'slider-card';
      card.innerHTML = `
        <img src="${item.img}" alt="${item.title}" class="card-image" loading="lazy">
        <div class="card-overlay">
          <h3 class="card-title">${item.title}</h3>
          <p class="card-subtitle">${item.subtitle}</p>
        </div>
      `;

      // Open modal on click ANYWHERE unconditionally
      card.addEventListener('click', () => {
        modalTitle.textContent = item.title;
        modalDesc.textContent = item.desc;
        modalImage.src = item.img;
        modal.classList.add('show');
        document.body.style.overflow = 'hidden'; // prevent bg scrolling
      });

      slider.appendChild(card);
    });

    // Scroll buttons
    btnPrev.addEventListener('click', () => {
      // scroll left by one card width + gap (320 + 32 = 352) -> approx 360
      slider.scrollBy({ left: -360, behavior: 'smooth' });
    });

    btnNext.addEventListener('click', () => {
      slider.scrollBy({ left: 360, behavior: 'smooth' });
    });

    // Modal behavior
    modalCloseBtn.addEventListener('click', () => {
      modal.classList.remove('show');
      document.body.style.overflow = '';
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.remove('show');
        document.body.style.overflow = '';
      }
    });

  </script>
</body>

</html>
